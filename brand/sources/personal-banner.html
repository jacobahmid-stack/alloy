<!doctype html><html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700&family=DM+Serif+Display&family=DM+Sans:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1584px;height:396px;overflow:hidden}
.c{position:relative;width:1584px;height:396px;background:#141310;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;padding:0 90px 0 440px}
.glowR{position:absolute;right:-160px;top:50%;transform:translateY(-50%);width:780px;height:780px;background:radial-gradient(circle,rgba(240,136,62,.26),rgba(226,98,42,.08) 44%,rgba(20,19,16,0) 70%);pointer-events:none}
.glowL{position:absolute;left:50px;bottom:-280px;width:580px;height:540px;background:radial-gradient(circle at 50% 50%,rgba(226,98,42,.15),rgba(20,19,16,0) 66%);pointer-events:none}
.eyebrow{position:relative;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:15px;letter-spacing:.27em;color:#FDFAF5;margin-bottom:24px}
.eyebrow .d{color:#E2622A;margin:0 11px}
.hero{position:relative;font-family:'DM Serif Display',serif;font-size:55px;line-height:1.06;letter-spacing:-.015em;color:#FDFAF5;white-space:nowrap}
.molten{background:linear-gradient(120deg,#B83D0C,#E2622A 55%,#F0883E);-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{position:relative;font-family:'DM Sans',sans-serif;font-weight:400;font-size:19px;color:#A4A09B;margin-top:22px;letter-spacing:.01em}
</style></head><body>
<div class="c">
  <div class="glowL"></div><div class="glowR"></div>
  <div class="eyebrow">FORJ<span class="d">·</span>ALLOY<span class="d">·</span>SMITH</div>
  <div class="hero">Funded, <span class="molten">co-sell-ready</span> AWS pipeline.</div>
  <div class="sub">The commercial engine for AWS partners. Done with you, or in your own workspace.</div>
</div></body></html>
