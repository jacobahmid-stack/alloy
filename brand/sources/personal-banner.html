<!doctype html><html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1584px;height:396px;overflow:hidden}
.c{position:relative;width:1584px;height:396px;background:#141310;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;padding:0 90px 0 440px}
.glowR{position:absolute;right:-160px;top:50%;transform:translateY(-50%);width:780px;height:780px;background:radial-gradient(circle,rgba(158,146,216,.26),rgba(123,107,203,.08) 44%,rgba(20,19,16,0) 70%);pointer-events:none}
.glowL{position:absolute;left:50px;bottom:-280px;width:580px;height:540px;background:radial-gradient(circle at 50% 50%,rgba(123,107,203,.15),rgba(20,19,16,0) 66%);pointer-events:none}
.eyebrow{position:relative;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;letter-spacing:.27em;color:#FDFAF5;margin-bottom:24px}
.eyebrow .d{color:#7B6BCB;margin:0 11px}
.hero{position:relative;font-family:'Space Grotesk',sans-serif;font-size:52px;line-height:1.06;letter-spacing:-.015em;color:#FDFAF5;white-space:nowrap}
.molten{background:linear-gradient(120deg,#4B3CA0,#7B6BCB 55%,#9E92D8);-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{position:relative;font-family:'Inter',sans-serif;font-weight:400;font-size:19px;color:#A4A09B;margin-top:22px;letter-spacing:.01em}
</style></head><body>
<div class="c">
  <div class="glowL"></div><div class="glowR"></div>
  <div class="eyebrow">FORJ<span class="d">·</span>ALLOY<span class="d">·</span>SMITH</div>
  <div class="hero">Funded, <span class="molten">co-sell-ready</span> cloud pipeline.</div>
  <div class="sub">The commercial engine for cloud partners. Done with you, or in your own workspace.</div>
</div></body></html>
