<!doctype html><html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:300px;height:300px;overflow:hidden}
.c{position:relative;width:300px;height:300px;background:#141310;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;text-align:center}
.glow{position:absolute;left:50%;bottom:-150px;transform:translateX(-50%);width:380px;height:320px;background:radial-gradient(circle at 50% 50%,rgba(158,146,216,.24),rgba(20,19,16,0) 66%);pointer-events:none}
.al{position:relative;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:56px;letter-spacing:.10em;line-height:1;padding-left:.10em;background:linear-gradient(120deg,#4B3CA0,#7B6BCB 55%,#9E92D8);-webkit-background-clip:text;background-clip:text;color:transparent}
.by{position:relative;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;letter-spacing:.34em;color:#8C8880;margin-top:16px;padding-left:.34em}
.by b{color:#FDFAF5;font-weight:700}
</style></head><body>
<div class="c"><div class="glow"></div>
  <div class="al">ALLOY</div>
  <div class="by">BY <b>FORJ</b></div>
</div></body></html>
