<!doctype html><html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1000px;height:300px;overflow:hidden}
.c{position:relative;width:1000px;height:300px;background:#141310;display:flex;align-items:center;justify-content:center;gap:44px;overflow:hidden}
.glow{position:absolute;left:50%;bottom:-220px;transform:translateX(-50%);width:760px;height:520px;background:radial-gradient(circle at 50% 50%,rgba(226,98,42,.18),rgba(20,19,16,0) 66%);pointer-events:none}
.icon{position:relative;width:132px;height:132px}
.wm{position:relative;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:98px;letter-spacing:.15em;color:#FDFAF5;line-height:1;padding-left:.15em}
</style></head><body>
<div class="c">
  <div class="glow"></div>
  <div class="icon">
    <svg width="132" height="132" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
      <defs><radialGradient id="g" cx="24%" cy="80%" r="62%">
        <stop offset="0%" stop-color="#F0883E" stop-opacity="0.55"/><stop offset="42%" stop-color="#E2622A" stop-opacity="0.20"/><stop offset="72%" stop-color="#141310" stop-opacity="0"/>
      </radialGradient></defs>
      <rect width="512" height="512" rx="96" fill="#1B1915"/>
      <rect width="512" height="512" rx="96" fill="url(#g)"/>
      <g transform="translate(165,374) scale(0.36,-0.36)"><path d="M86 0V660H178V0ZM122 283V362H501V283ZM122 579V660H544V579Z" fill="#FDFAF5"/></g>
    </svg>
  </div>
  <div class="wm">FORJ</div>
</div>
</body></html>
