<!doctype html><html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1128px;height:191px;overflow:hidden}
.c{position:relative;width:1128px;height:191px;background:#141310;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;padding:0 64px 0 312px}
.glowR{position:absolute;right:-120px;top:50%;transform:translateY(-50%);width:560px;height:560px;background:radial-gradient(circle,rgba(158,146,216,.30),rgba(123,107,203,.10) 42%,rgba(20,19,16,0) 70%);pointer-events:none}
.glowL{position:absolute;left:-70px;bottom:-170px;width:400px;height:400px;background:radial-gradient(circle at 50% 50%,rgba(123,107,203,.18),rgba(20,19,16,0) 68%);pointer-events:none}
.brand{position:relative;display:flex;align-items:baseline}
.al{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:60px;letter-spacing:.02em;line-height:1;background:linear-gradient(120deg,#4B3CA0,#7B6BCB 55%,#9E92D8);-webkit-background-clip:text;background-clip:text;color:transparent}
.by{font-family:'Space Mono',monospace;font-weight:700;font-size:18px;letter-spacing:.1em;color:#8C8880;margin-left:20px}
.by b{color:#FDFAF5;font-weight:700}
.sub{position:relative;font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:23px;color:#C9C4BB;margin-top:14px;letter-spacing:-.01em}
</style></head><body>
<div class="c">
  <div class="glowL"></div><div class="glowR"></div>
  <div class="brand"><span class="al">ALLOY</span><span class="by">by <b>FORJ</b></span></div>
  <div class="sub">Smith forges your cloud deals.</div>
</div></body></html>
