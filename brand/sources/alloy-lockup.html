<!doctype html><html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1000px;height:300px;overflow:hidden}
.c{position:relative;width:1000px;height:300px;background:#141310;display:flex;align-items:center;justify-content:center;gap:44px;overflow:hidden}
.glow{position:absolute;left:50%;bottom:-220px;transform:translateX(-50%);width:760px;height:520px;background:radial-gradient(circle at 50% 50%,rgba(226,98,42,.18),rgba(20,19,16,0) 66%);pointer-events:none}
.icon{position:relative;width:132px;height:132px}
.text{position:relative}
.word{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:90px;letter-spacing:.13em;color:#FDFAF5;line-height:1;padding-left:.13em}
.by{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:22px;letter-spacing:.30em;color:#8C8880;margin-top:14px;padding-left:.30em}
.by b{color:#FDFAF5;font-weight:700}
</style></head><body>
<div class="c">
  <div class="glow"></div>
  <div class="icon">
    <svg width="132" height="132" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="m" x1="0%" y1="0%" x2="100%" y2="88%"><stop offset="0%" stop-color="#B83D0C"/><stop offset="55%" stop-color="#E2622A"/><stop offset="100%" stop-color="#F0883E"/></linearGradient>
        <radialGradient id="s" cx="78%" cy="16%" r="60%"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/><stop offset="55%" stop-color="#FFFFFF" stop-opacity="0"/></radialGradient>
      </defs>
      <rect width="512" height="512" rx="96" fill="url(#m)"/>
      <rect width="512" height="512" rx="96" fill="url(#s)"/>
      <g fill="none" stroke="#141310" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="6">
        <path d="M168 368 L256 150 L344 368" stroke-width="46"/>
        <path d="M194 300 L318 300" stroke-width="40"/>
      </g>
    </svg>
  </div>
  <div class="text">
    <div class="word">ALLOY</div>
    <div class="by">BY <b>FORJ</b></div>
  </div>
</div>
</body></html>
