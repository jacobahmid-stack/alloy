<!doctype html><html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1128px;height:191px;overflow:hidden}
.c{position:relative;width:1128px;height:191px;background:#141310;overflow:hidden;display:flex;align-items:center;padding:0 56px 0 300px}
.glow{position:absolute;right:40px;top:50%;transform:translateY(-50%);width:520px;height:520px;background:radial-gradient(circle,rgba(158,146,216,.30),rgba(123,107,203,.10) 44%,rgba(20,19,16,0) 70%);pointer-events:none}
.txt{position:relative;flex:1;min-width:0}
.eyebrow{font-family:'Space Mono',monospace;font-weight:700;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#8C8880;margin-bottom:12px}
.eyebrow b{color:#FDFAF5}
.eyebrow .by{color:#8C8880;font-weight:400}
.tag{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:33px;line-height:1.1;letter-spacing:-.02em;color:#FDFAF5}
.molten{background:linear-gradient(120deg,#4B3CA0,#7B6BCB 55%,#9E92D8);-webkit-background-clip:text;background-clip:text;color:transparent}
.smith{position:relative;flex:0 0 auto;width:138px;height:138px;border-radius:50%;margin-left:36px;overflow:hidden;box-shadow:0 0 0 2px #7B6BCB,0 18px 40px rgba(0,0,0,.5)}
.smith img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block}
</style></head><body>
<div class="c">
  <div class="glow"></div>
  <div class="txt">
    <div class="eyebrow"><b>ALLOY</b> <span class="by">by Forj</span></div>
    <div class="tag">Smith <span class="molten">forges</span><br>your cloud deals.</div>
  </div>
  <div class="smith"><img src="file:///C:/Users/jacob/alloy-page/public/smith.png" alt="Smith"></div>
</div>
</body></html>
