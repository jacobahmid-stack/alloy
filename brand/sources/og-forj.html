<!doctype html><html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:630px;overflow:hidden}
.c{position:relative;width:1200px;height:630px;background:#141310;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:80px}
.glowR{position:absolute;right:-160px;top:42%;transform:translateY(-50%);width:720px;height:720px;background:radial-gradient(circle,rgba(217,114,46,.26),rgba(217,114,46,.08) 44%,rgba(20,19,16,0) 70%);pointer-events:none}
.glowL{position:absolute;left:-80px;bottom:-220px;width:520px;height:480px;background:radial-gradient(circle at 50% 50%,rgba(217,114,46,.16),rgba(20,19,16,0) 66%);pointer-events:none}
.brandrow{position:relative;display:flex;align-items:center;gap:18px;margin-bottom:44px}
.tile{width:74px;height:74px;flex:0 0 auto}
.wm{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:30px;letter-spacing:.16em;color:#FDFAF5}
.wm .by{color:#8C8880;font-size:17px;letter-spacing:.18em;margin-left:10px}
.hero{position:relative;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:88px;line-height:1.04;letter-spacing:-.02em;color:#FDFAF5}
.hero .molten{color:#D9722E}
.sub{position:relative;font-family:'Inter',sans-serif;font-weight:400;font-size:27px;color:#A4A09B;margin-top:26px;max-width:880px;line-height:1.5}
.url{position:relative;font-family:'Space Mono',monospace;font-weight:700;font-size:18px;letter-spacing:.16em;color:#8C8880;margin-top:40px}
</style></head><body>
<div class="c">
  <div class="glowL"></div><div class="glowR"></div>
  <div class="brandrow">
    <svg class="tile" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><defs><radialGradient id="fg" cx="24%" cy="80%" r="62%"><stop offset="0%" stop-color="#9E92D8" stop-opacity="0.55"/><stop offset="42%" stop-color="#4B3CA0" stop-opacity="0.20"/><stop offset="72%" stop-color="#141310" stop-opacity="0"/></radialGradient></defs><rect width="512" height="512" rx="96" fill="#141310"/><rect width="512" height="512" rx="96" fill="url(#fg)"/><g transform="translate(165,374) scale(0.36,-0.36)"><path d="M86 0V660H178V0ZM122 283V362H501V283ZM122 579V660H544V579Z" fill="#FDFAF5"/></g></svg>
    <span class="wm">FORJ<span class="by">Nordic AWS partner GTM</span></span>
  </div>
  <div class="hero">Where pipeline is <span class="molten">forged.</span></div>
  <div class="sub">The commercial engine for AWS partners. Funded, co-sell-ready pipeline, powered by Alloy and Smith.</div>
  <div class="url">forj.se</div>
</div></body></html>
