<svg viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="'Space Grotesk', system-ui, sans-serif">
  <title id="t">Smith, the brain (public / LinkedIn safe)</title>
  <desc id="d">Public version, sources abstracted. Smith takes your whole market, each account's signals and your live pipeline, and forges the funded play, the opener and the next move. It checks before it ships, and you approve.</desc>
  <rect x="0" y="0" width="900" height="380" rx="18" fill="#0E0F12"/>
  <text x="40" y="46" font-family="'Space Mono', ui-monospace, monospace" font-size="12" letter-spacing="3" fill="#9BA8B3">ALLOY  ·  SMITH</text>
  <text x="40" y="78" font-size="26" font-weight="700" fill="#ECF0F3">Smith, the brain</text>
  <text x="40" y="100" font-size="13.5" fill="#9BA8B3">Grounded in. Forged out. Eval-checked, human-in-the-loop.</text>

  <g transform="translate(0,96)">
    <text x="40" y="24" font-family="'Space Mono', ui-monospace, monospace" font-size="11" letter-spacing="2" fill="#9E92D8" font-weight="700">GROUNDED IN  &#8594;</text>
    <text x="860" y="24" text-anchor="end" font-family="'Space Mono', ui-monospace, monospace" font-size="11" letter-spacing="2" fill="#D9722E" font-weight="700">&#8594;  FORGES</text>
    <g stroke="#2A2C32" stroke-width="1.4" fill="none" opacity="0.7">
      <path d="M242,71 C320,71 320,150 370,150"/>
      <path d="M242,150 L370,150"/>
      <path d="M242,229 C320,229 320,150 370,150"/>
      <path d="M530,150 C610,150 610,71 688,71"/>
      <path d="M530,150 L688,150"/>
      <path d="M530,150 C610,150 610,229 688,229"/>
    </g>
    <g font-size="14.5" fill="#ECF0F3">
      <g><rect x="42" y="48" width="200" height="46" rx="9" fill="#16171B" stroke="#2A2C32"/><rect x="42" y="48" width="4" height="46" rx="2" fill="#9E92D8"/><text x="60" y="76">Your whole market</text></g>
      <g><rect x="42" y="127" width="200" height="46" rx="9" fill="#16171B" stroke="#2A2C32"/><rect x="42" y="127" width="4" height="46" rx="2" fill="#9E92D8"/><text x="60" y="155">Each account&#39;s signals</text></g>
      <g><rect x="42" y="206" width="200" height="46" rx="9" fill="#16171B" stroke="#2A2C32"/><rect x="42" y="206" width="4" height="46" rx="2" fill="#9E92D8"/><text x="60" y="234">Your live pipeline</text></g>
    </g>
    <g font-size="14.5" fill="#ECF0F3">
      <g><rect x="688" y="48" width="200" height="46" rx="9" fill="#16171B" stroke="#2A2C32"/><rect x="884" y="48" width="4" height="46" rx="2" fill="#D9722E"/><text x="704" y="76">The funded play</text></g>
      <g><rect x="688" y="127" width="200" height="46" rx="9" fill="#16171B" stroke="#2A2C32"/><rect x="884" y="127" width="4" height="46" rx="2" fill="#D9722E"/><text x="704" y="155">The opener</text></g>
      <g><rect x="688" y="206" width="200" height="46" rx="9" fill="#16171B" stroke="#2A2C32"/><rect x="884" y="206" width="4" height="46" rx="2" fill="#D9722E"/><text x="704" y="234">The next move</text></g>
    </g>
    <defs><clipPath id="avl"><circle cx="450" cy="140" r="56"/></clipPath></defs>
    <text x="450" y="56" text-anchor="middle" font-family="'Space Mono', ui-monospace, monospace" font-size="9.5" letter-spacing="1.5" fill="#7C8893">CHECKS BEFORE IT SHIPS</text>
    <image href="smith-face.png" x="394" y="84" width="112" height="112" clip-path="url(#avl)" preserveAspectRatio="xMidYMid slice"/>
    <circle cx="450" cy="140" r="56" fill="none" stroke="#9E92D8" stroke-width="2"/>
    <text x="450" y="218" text-anchor="middle" font-size="20" font-weight="700" fill="#ECF0F3">SMITH</text>
    <text x="450" y="236" text-anchor="middle" font-size="12" fill="#9BA8B3">your AI co-worker</text>
    <text x="450" y="260" text-anchor="middle" font-family="'Space Mono', ui-monospace, monospace" font-size="9.5" letter-spacing="1.5" fill="#7C8893">YOU APPROVE</text>
  </g>
</svg>
