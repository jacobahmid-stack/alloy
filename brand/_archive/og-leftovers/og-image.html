<!doctype html><html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#14161A;--ink-mid:#4A4F57;--ink-dim:#7a7f87;--accent:#4B3CA0;--accent2:#6A5BB8;
        --aws:#FF9900;--azure:#0089D6;--g1:#4285F4;--g2:#EA4335;--g3:#FBBC05;--g4:#34A853;}
  *{margin:0;box-sizing:border-box;}
  html,body{width:1200px;height:630px;}
  body{display:flex;font-family:'Inter',sans-serif;background:#fff;overflow:hidden;}
  .left{flex:1;padding:60px 56px;display:flex;flex-direction:column;}
  .brand{display:flex;align-items:center;gap:14px;}
  .brand .mark{width:48px;height:48px;border-radius:12px;background:linear-gradient(150deg,#1b1d22,#2a130a);display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .brand .mark img{width:100%;height:100%;}
  .brand .word{font-family:'Space Grotesk';font-weight:500;font-size:27px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink);}
  .brand .word b{color:var(--accent2);font-weight:700;}
  h1{font-family:'Space Grotesk';font-weight:700;font-size:52px;line-height:1.06;letter-spacing:-.025em;color:var(--ink);margin-top:auto;}
  h1 em{font-style:normal;color:var(--accent);}
  .sub{font-size:25px;font-weight:300;color:var(--ink-mid);margin-top:22px;}
  .strip{margin-top:auto;display:flex;align-items:center;gap:16px;font-size:16.5px;color:var(--ink-dim);letter-spacing:.02em;}
  .cloud{display:inline-flex;align-items:center;gap:8px;}
  .dot{width:14px;height:14px;border-radius:4px;flex:none;}
  .d-aws{background:var(--aws);} .d-azure{background:var(--azure);}
  .d-gcp{background:conic-gradient(from -45deg,var(--g2) 0 25%,var(--g3) 0 50%,var(--g4) 0 75%,var(--g1) 0 100%);}
  .sep{color:#c9ccd2;}
  .right{width:432px;background:#14161A;display:flex;align-items:flex-end;justify-content:center;position:relative;overflow:hidden;}
  .right::before{content:"";position:absolute;inset:0;background:radial-gradient(120% 75% at 50% 8%, rgba(75,60,160,.28), transparent 60%);}
  .right img{height:566px;width:auto;object-fit:contain;position:relative;z-index:1;filter:drop-shadow(0 18px 30px rgba(0,0,0,.42));}
</style></head>
<body>
  <div class="left">
    <div class="brand"><span class="mark"><img src="favicon.svg" alt=""></span><span class="word">For<b>j</b></span></div>
    <h1>Smith <em>forges</em> your<br>cloud, data &amp; AI deals.</h1>
    <div class="sub">Alloy by Forj · multicloud sales intelligence</div>
    <div class="strip">
      <span class="cloud"><span class="dot d-aws"></span>AWS</span>
      <span class="cloud"><span class="dot d-azure"></span>Azure</span>
      <span class="cloud"><span class="dot d-gcp"></span>Google Cloud</span>
      <span class="sep">·</span><span>EU-hosted</span>
    </div>
  </div>
  <div class="right"><img src="smith-hero.png" alt="Smith"></div>
</body></html>
