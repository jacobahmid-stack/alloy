<!doctype html><html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1128px;height:191px;overflow:hidden}
.c{position:relative;width:1128px;height:191px;background:#F3F0EA;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;padding:0 64px 0 320px}
.glowR{position:absolute;right:-120px;top:50%;transform:translateY(-50%);width:560px;height:560px;background:radial-gradient(circle,rgba(240,136,62,.20),rgba(226,98,42,.06) 42%,rgba(243,240,234,0) 70%);pointer-events:none}
.glowL{position:absolute;left:-70px;bottom:-170px;width:400px;height:400px;background:radial-gradient(circle at 50% 50%,rgba(226,98,42,.12),rgba(243,240,234,0) 68%);pointer-events:none}
.eyebrow{position:relative;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:12px;letter-spacing:.26em;text-transform:uppercase;color:#6A6760;margin-bottom:16px}
.eyebrow b{color:#1A1916;font-weight:700}
.tag{position:relative;font-family:'DM Serif Display',serif;font-size:44px;line-height:1.04;letter-spacing:-.01em;color:#1A1916;white-space:nowrap}
.molten{background:linear-gradient(120deg,#B83D0C,#E2622A 55%,#F0883E);-webkit-background-clip:text;background-clip:text;color:transparent}
</style></head><body>
<div class="c">
  <div class="glowL"></div><div class="glowR"></div>
  <div class="eyebrow"><b>FORJ</b> &nbsp;·&nbsp; Nordic AWS partner GTM</div>
  <div class="tag">Where pipeline is <span class="molten">forged.</span></div>
</div></body></html>
