<!doctype html><html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1128px;height:191px;overflow:hidden}
.c{position:relative;width:1128px;height:191px;background:linear-gradient(125deg,#FCFAFF 0%,#F1EBFF 54%,#FBF6FF 100%);overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;padding:0 64px 0 320px}
.glowR{position:absolute;right:-120px;top:50%;transform:translateY(-50%);width:560px;height:560px;background:radial-gradient(circle,rgba(255,176,74,.30),rgba(96,165,255,.10) 42%,rgba(251,247,255,0) 70%);pointer-events:none}
.glowL{position:absolute;left:-70px;bottom:-170px;width:400px;height:400px;background:radial-gradient(circle at 50% 50%,rgba(96,165,255,.20),rgba(251,247,255,0) 68%);pointer-events:none}
.eyebrow{position:relative;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:12px;letter-spacing:.26em;text-transform:uppercase;color:#6E6782;margin-bottom:16px}
.eyebrow b{color:#1B1533;font-weight:700}
.tag{position:relative;font-family:'Space Grotesk',sans-serif;font-size:44px;line-height:1.04;letter-spacing:-.01em;color:#1B1533;white-space:nowrap}
.molten{background:linear-gradient(120deg,#4A2A9E,#7C5CFC 55%,#A99BFF);-webkit-background-clip:text;background-clip:text;color:transparent}
</style></head><body>
<div class="c">
  <div class="glowL"></div><div class="glowR"></div>
  <div class="eyebrow"><b>FORJ</b> &nbsp;·&nbsp; Nordic multicloud partner GTM</div>
  <div class="tag">Where pipeline is <span class="molten">forged.</span></div>
</div>
</body></html>
